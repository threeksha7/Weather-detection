<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather App</title>

<style>

body{
font-family: Arial, sans-serif;
background: linear-gradient(to right, #4facfe, #00f2fe);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
margin:0;
}

.container{
background:white;
padding:30px;
border-radius:10px;
text-align:center;
width:320px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h1{
margin-bottom:20px;
}

input{
width:80%;
padding:10px;
margin-bottom:10px;
border-radius:5px;
border:1px solid gray;
}

button{
padding:10px 20px;
background:#4facfe;
border:none;
color:white;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#2b7bd8;
}

.weather-box{
margin-top:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>Weather App</h1>

<input type="text" id="locationInput" placeholder="Enter city name">

<br>

<button onclick="getWeather()">Get Weather</button>

<div id="weatherResult" class="weather-box"></div>

</div>

<script>

function getWeather(){

let location = document.getElementById("locationInput").value;

let apiKey = "46b055b5163f45ae9aa152010260704";

let url = `http://api.weatherapi.com/v1/current.json?key=${apiKey}&q=${location}&aqi=yes`;

fetch(url)

.then(response => response.json())

.then(data => {

let weather = `
<h2>${data.location.name}, ${data.location.country}</h2>
<p><b>Temperature:</b> ${data.current.temp_c} °C</p>
<p><b>Condition:</b> ${data.current.condition.text}</p>
<p><b>Humidity:</b> ${data.current.humidity}%</p>
<p><b>Wind Speed:</b> ${data.current.wind_kph} kph</p>
<img src="${data.current.condition.icon}">
`;

document.getElementById("weatherResult").innerHTML = weather;

})

.catch(error => {
document.getElementById("weatherResult").innerHTML = "Location not found";
});

}

</script>

</body>
</html>
